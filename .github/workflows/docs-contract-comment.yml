name: Docs Contract Comment

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  docs-contract-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base repository policy files
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect PR changed files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const names = files.map((file) => file.filename).sort();
            fs.writeFileSync("docs-contract-changed-files.txt", names.join("\n") + "\n");

      - name: Run docs contract
        id: doc-impact
        env:
          DOC_CONTRACT_PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set +e
          args=()
          while IFS= read -r path; do
            if test -n "$path"; then
              args+=(--changed-file "$path")
            fi
          done < docs-contract-changed-files.txt
          python3 scripts/check_doc_impact.py --format json "${args[@]}" > docs-impact.json
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Render docs contract comment
        run: |
          python3 scripts/render_docs_contract_comment.py \
            --doc-impact-json docs-impact.json \
            --output docs-contract-comment.md \
            --repo-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            --ref "${{ github.event.pull_request.base.sha }}" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Upsert docs contract comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- repo-contract-kit:docs-contract-comment -->";
            const body = fs.readFileSync("docs-contract-comment.md", "utf8");
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: Fail on missing documentation coverage
        if: steps.doc-impact.outputs.exit_code != '0'
        run: |
          echo "Documentation impact is missing matching docs coverage."
          exit 1
