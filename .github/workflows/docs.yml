name: Docs Checks

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run docs lint
        run: make docs-lint

      - name: Run docs build
        run: make docs-build

      - name: Run docs generate
        run: make docs-generate

      - name: Check documentation impact
        env:
          DOC_CONTRACT_PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 scripts/check_doc_impact.py
