name: Agentic Review Read-Only

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  read-only-agent-review:
    runs-on: ubuntu-latest
    env:
      AGENT_TRUST_PROFILE: untrusted-pr
      MODE: pull-request
    steps:
      - name: Checkout without write credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify installed policy files
        run: |
          test -f .agent-workflows/agent-permission-policy.json
          test -f schemas/agent-permission-policy.schema.json
          python3 -m json.tool .agent-workflows/agent-permission-policy.json >/dev/null
          python3 -m json.tool schemas/agent-permission-policy.schema.json >/dev/null

      - name: Run local documentation contract
        run: |
          python3 scripts/repo_contract_kit.py doc-impact --repo . --format sarif > docs-impact.sarif
          make docs-check

      - name: Run local agent instruction lint
        run: python3 scripts/lint_agent_docs.py --strict-paths --format sarif > agent-docs-lint.sarif

      - name: Generate read-only review artifacts
        run: |
          make agent-start MODE=pull-request
          make agent-run-review AGENT=manual MODE=pull-request AGENT_TRUST_PROFILE=untrusted-pr
